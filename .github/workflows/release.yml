name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: macos-latest
            target: darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: moon install

      - name: Build release binary
        run: moon build --target native --release

      - name: Package binary
        env:
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p dist
          cp _build/native/release/build/src/cmd/main/main.exe dist/molt
          chmod +x dist/molt
          tar czf "molt-${TARGET}.tar.gz" -C dist molt

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET: ${{ matrix.target }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "${TAG}" "molt-${TARGET}.tar.gz"
