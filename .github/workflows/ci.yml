name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commitlint:
    name: Commit Message Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yml

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update registry index
        run: moon update

      - name: Check (native)
        run: moon check --target native

      - name: Format check
        run: |
          moon fmt
          git diff --exit-code -- '*.mbt'

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update registry index
        run: moon update

      - name: Test (wasm-gc)
        run: moon test

      - name: Test (native) with coverage
        run: moon test --target native --enable-coverage

      - name: Generate coverage report
        run: moon coverage report -f coveralls -o codecov.json --send-to codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update registry index
        run: moon update

      - name: Build native binary
        run: moon build --target native

      - name: Verify binary exists
        run: test -f _build/native/debug/build/src/cmd/main/main.exe

      - name: Show binary size
        run: ls -lh _build/native/debug/build/src/cmd/main/main.exe

      - name: Smoke test
        run: ./_build/native/debug/build/src/cmd/main/main.exe --help
