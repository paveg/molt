name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: Build (${{ matrix.target }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: macos-latest
            target: darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update registry index
        run: moon update

      - name: Build release binary
        run: moon build --target native --release

      - name: Package binary
        env:
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p dist
          cp _build/native/release/build/src/cmd/main/main.exe dist/molt
          chmod +x dist/molt
          tar czf "molt-${TARGET}.tar.gz" -C dist molt

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET: ${{ matrix.target }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "${TAG}" "molt-${TARGET}.tar.gz"
